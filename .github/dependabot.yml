version: 2
registries:
  dockerhub:
    type: docker-registry
    url: https://registry.hub.docker.com
    username: ${{secrets.DOCKERHUB_USERNAME}}
    password: ${{secrets.DOCKERHUB_TOKEN}}
updates:
  - package-ecosystem: "docker"
    directories:
      - "/Amazon_Linux_2023_Base/"
      - "/Liquibase/"
      - "/Codebuild_Base/"
    registries:
      - dockerhub
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
