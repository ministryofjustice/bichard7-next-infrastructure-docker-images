---
version: 2.1

commands:
  checkout_core:
    steps:
      - run:
          name: Checkout the Core repo
          command: git clone --depth 1 https://github.com/ministryofjustice/bichard7-next-core.git ~/bichard7-next-core

  build_and_cache_image:
    parameters:
      image_name:
        type: string
      dockerfile:
        type: string
      cache_key:
        type: string
      image_tag:
        type: string
        default: ""
      context:
        type: string
        default: "."
      lockfile:
        type: string
        default: "package-lock.json"
    steps:
      - restore_cache:
          name: Restore BuildKit cache for << parameters.image_name >>
          keys:
            - << parameters.cache_key >>-{{ checksum "<< parameters.dockerfile >>" }}-{{ checksum "<< parameters.lockfile >>" }}
            - << parameters.cache_key >>-{{ checksum "<< parameters.dockerfile >>" }}-
            - << parameters.cache_key >>-
      - run:
          name: Build << parameters.image_name >> Docker image
          command: |
            IMAGE_TAG="<< parameters.image_tag >>"
            if [ -z "$IMAGE_TAG" ]; then
              IMAGE_TAG="${DOCKER_TAG}"
            fi
            docker buildx build \
              --cache-from type=local,src=/tmp/buildx-cache-<< parameters.image_name >> \
              --cache-to type=local,dest=/tmp/buildx-cache-<< parameters.image_name >>-new,mode=max \
              -f << parameters.dockerfile >> \
              -t "<< parameters.image_name >>:${IMAGE_TAG}" \
              --load \
              << parameters.context >>
      - run:
          name: Rotate cache for << parameters.image_name >>
          when: always
          command: |
            rm -rf /tmp/buildx-cache-<< parameters.image_name >>
            mv /tmp/buildx-cache-<< parameters.image_name >>-new /tmp/buildx-cache-<< parameters.image_name >>
      - save_cache:
          name: Save BuildKit cache for << parameters.image_name >>
          key: << parameters.cache_key >>-{{ checksum "<< parameters.dockerfile >>" }}-{{ checksum "<< parameters.lockfile >>" }}
          paths:
            - /tmp/buildx-cache-<< parameters.image_name >>

  load_audit_logging_images:
    steps:
      - run:
          name: Load audit log api image
          command: docker image load < "images/audit-log-api.tar.gz"
      - run:
          name: Load event handler image
          command: docker image load < "images/event-handler.tar.gz"

  load_postgres_image:
    steps:
      - run:
          name: Load postgres image
          command: docker image load < "images/postgres.tar.gz"
jobs:
  build_amazon_linux_2_images:
    machine:
      image: ubuntu-2204:current
      docker_layer_caching: true
    resource_class: xlarge
    steps:
      - checkout
      - run: sudo bash scripts/install_goss.sh
      - run: make build-al2

  build_amazon_linux_2023_images:
    machine:
      image: ubuntu-2204:current
      docker_layer_caching: true
    resource_class: xlarge
    steps:
      - checkout
      - run: sudo bash scripts/install_goss.sh
      - run: make build-al2023

  build_audit_logging_images:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    environment:
      SKIP_GOSS: true
    steps:
      - checkout
      - run: sudo apt-get update && sudo apt-get install -y pigz
      - run:
          name: Build Nodejs Nginx Supervisord images
          command: make Nginx_NodeJS_24_2023_Supervisord
      - run:
          name: Clone bichard7-next-audit-logging
          command: git clone --depth 1 https://github.com/ministryofjustice/bichard7-next-audit-logging.git /home/circleci/bichard7-next-audit-logging
      - build_and_cache_image:
          image_name: "audit-log-api"
          dockerfile: "/home/circleci/bichard7-next-audit-logging/src/audit-log-api/Dockerfile"
          context: "/home/circleci/bichard7-next-audit-logging"
          cache_key: "audit-log-api-cache-v1"
          image_tag: "latest"
          lockfile: "/home/circleci/bichard7-next-audit-logging/package-lock.json"
      - build_and_cache_image:
          image_name: "event-handler"
          dockerfile: "/home/circleci/bichard7-next-audit-logging/src/event-handler/Dockerfile"
          context: "/home/circleci/bichard7-next-audit-logging"
          cache_key: "event-handler-cache-v1"
          image_tag: "latest"
          lockfile: "/home/circleci/bichard7-next-audit-logging/package-lock.json"
      - run:
          name: Save Docker images
          command: |
            mkdir -p images
            docker image save "audit-log-api:latest" | pigz > "images/audit-log-api.tar.gz"
            docker image save "event-handler:latest" | pigz > "images/event-handler.tar.gz"
      - persist_to_workspace:
          root: .
          paths:
            - images

  build_postgres_image:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - checkout_core
      - run: sudo apt-get update && sudo apt-get install -y pigz
      - build_and_cache_image:
          image_name: bichard-postgres
          dockerfile: ~/bichard7-next-core/environment/postgres/Dockerfile
          cache_key: buildkit-postgres
          image_tag: latest
          context: ~/bichard7-next-core/environment/postgres
      - run:
          name: Save Docker image
          command: |
            mkdir -p images
            docker image save "bichard-postgres:latest" | pigz > "images/postgres.tar.gz"
      - persist_to_workspace:
          root: .
          paths:
            - images

  test_conductor:
    machine:
      image: ubuntu-2204:current
      docker_layer_caching: true
    resource_class: large
    environment:
      SKIP_GOSS: true
    steps:
      - checkout
      - run:
          name: Install goss
          command: sudo bash scripts/install_goss.sh
      - run:
          name: Build Conductor image
          environment:
            SKIP_GOSS: false
          command: make Conductor
      - run:
          name: Build Nodejs Nginx Supervisord images
          command: make Nginx_NodeJS_20_2023_Supervisord
      - load_audit_logging_images
      - load_postgres_image
      - checkout_core
      - run:
          working_directory: ~/bichard7-next-core
          command: nvm install
      - run:
          name: npm install
          working_directory: ~/bichard7-next-core
          command: npm ci
      - run:
          name: Build core
          working_directory: ~/bichard7-next-core
          command: npm run build:core
      - run:
          name: Run the infrastructure
          working_directory: ~/bichard7-next-core
          environment:
            PHASE_2_QUEUE_NAME: TEST_PHASE2_QUEUE
            PHASE_3_QUEUE_NAME: TEST_PHASE3_QUEUE
          command: bash .circleci/scripts/run-infrastructure.sh conductor all-build-worker
      - run:
          name: Test the workflows
          working_directory: ~/bichard7-next-core
          command: nvm use && npm run -w packages/conductor test

  test_liquibase:
    machine:
      image: ubuntu-2204:current
      docker_layer_caching: true
    resource_class: large
    steps:
      - checkout
      - run: sudo bash scripts/install_goss.sh
      - run: make Liquibase

workflows:
  build_and_test:
    jobs:
      - build_amazon_linux_2_images
      - build_amazon_linux_2023_images
      - build_audit_logging_images
      - build_postgres_image

      - test_liquibase

      - test_conductor:
          requires:
            - build_audit_logging_images
            - build_postgres_image
#            - build_message_forwarder_image
#            - build_worker_image
#            - build_ui_image
#            - build_user_service_image
#            - build_api_image
